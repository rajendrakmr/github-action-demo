name: DevSecOps End To End Pipline

on: 
    push:
        branches: [ dev ]

jobs:
    code-quality:
        uses: ./.github/workflows/code-quality-check.yml
    
    secrets-scan:
        uses:  ./.github/workflows/secrets-scan.yml
    
    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-file-scan:
        uses: ./.github/workflows/docker-scan.yml

    build-and-push:
        needs: [ code-quality,secrets-scan,dependency-scan ,docker-file-scan]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit